# Reference copy of the launchpad.toml that the Cloudflare Worker serves.
#
# The Worker (src/index.js) is the canonical source — it rewrites
# firmware_images_url at request time so the same Worker code works on any
# deployment URL, and it generates the TOML from a single
# SUPPORTED_VARIANTS list. Keep this file in sync with the generated
# output so humans can read and review the TOML as TOML.
#
# ESP Launchpad's schema puts firmware_images_url at the top level with
# no per-section override; while only the wireless variant ships, the
# top-level URL points at its latest-stable-wireless floating release.
# Multi-variant Launchpad support will need a different shape (see the
# SUPPORTED_VARIANTS comment in src/index.js).
#
# Section header is quoted (`["..."]`) because the label has spaces —
# TOML's bare-key rule rejects them on strict parsers.
#
# Image key uses the hyphenated chipset name: Launchpad looks up
# `image.<chipset.toLowerCase()>` preserving dashes, so chipset
# `ESP32-S3` maps to `image.esp32-s3` (not `image.esp32s3`).
#
# No `readme.text` — despite the field name, it's a URL pointing at a
# hosted markdown file, not inline text. Re-add as `readme.text =
# "https://.../README.md"` if we want a Launchpad blurb later.
#
# Schema:  https://github.com/espressif/esp-launchpad/blob/main/config/config.toml

esp_toml_version = 1.0
firmware_images_url = "https://firmware-proxy.<account>.workers.dev/imdacrocker/esp32_gopro_controller/releases/download/latest-stable-wireless/"
supported_apps = ["GoPro CAN-Bus Controller"]

["GoPro CAN-Bus Controller"]
chipsets = ["ESP32-S3"]
image.esp32-s3 = "factory.bin"
