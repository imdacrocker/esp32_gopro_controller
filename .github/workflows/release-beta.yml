name: release-beta

# Manual trigger from the Actions tab. Reads the VERSION file and publishes
# v<VERSION> as a prerelease, then moves the latest-beta floating tag to it.
#
# Bump VERSION before each run - if v<VERSION> already exists, the workflow
# refuses to overwrite it. Beta and stable use the same binary; promotion is
# a pure pointer move (see release-promote.yml).

on:
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases and move floating tags

jobs:
  beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version from VERSION file
        id: ver
        run: |
          VERSION=$(cat VERSION)
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"

      - name: Refuse to overwrite an existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::${{ steps.ver.outputs.tag }} already exists. Bump VERSION and commit before cutting another release."
            exit 1
          fi

      - name: Stamp version into sdkconfig.defaults
        run: |
          sed -i "s/^CONFIG_APP_PROJECT_VER=.*/CONFIG_APP_PROJECT_VER=\"${{ steps.ver.outputs.version }}\"/" \
              apps/main/sdkconfig.defaults

      - name: Build main app
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32s3
          path: apps/main

      - name: Build recovery app
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32s3
          path: apps/recovery

      - name: Stage assets and generate manifest
        run: |
          mkdir -p release
          cp apps/main/build/esp32_gopro_canbus_controller_v2.bin release/app.bin
          cp apps/main/build/storage.bin                          release/storage.bin
          cp apps/recovery/build/esp32_gopro_canbus_recovery.bin  release/recovery.bin
          python tools/release/make_manifest.py \
            --version "${{ steps.ver.outputs.tag }}" \
            --app-bin     release/app.bin \
            --storage-bin release/storage.bin \
            --release-notes-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${{ steps.ver.outputs.tag }}" \
            --output release/manifest.json

      - name: Create immutable release
        # Prerelease=true until release-promote.yml flips it to stable.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes "Built from \`${GITHUB_SHA::7}\`. Not yet promoted to stable." \
            --target "$GITHUB_SHA" \
            --prerelease \
            release/manifest.json release/app.bin release/storage.bin release/recovery.bin

      - name: Move latest-beta floating tag
        # Floating tag is what the Cloudflare Worker proxies to the device.
        # GitHub releases can't retarget a tag, so delete + recreate.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-beta --yes --cleanup-tag || true
          gh release create latest-beta \
            --title "Latest beta (${{ steps.ver.outputs.tag }})" \
            --notes "Floating tag for \`${{ steps.ver.outputs.tag }}\`." \
            --target "$GITHUB_SHA" \
            --prerelease \
            release/manifest.json release/app.bin release/storage.bin release/recovery.bin
