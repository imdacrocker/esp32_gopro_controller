name: release-dev

# Manual trigger from the Actions tab. Builds the selected branch (or the
# branch the workflow was launched from) and force-moves the latest-dev
# floating release to it.
#
# Less formal than stable/beta:
#   - No VERSION bump required; the version stamp is dev-<shortsha>-<utc>.
#   - No immutable v<X.Y.Z> tag; only the floating latest-dev release exists.
#   - No promotion path; dev never becomes beta or stable.
#   - Recovery-only consumption — the wireless app's settings dropdown does not
#     list "dev" (CONFIG_OTA_ALLOW_DEV_CHANNEL stays off in apps/wireless).
#     Testers must boot into recovery to pick this channel.
#   - No version check on the device side; recovery installs whatever the
#     manifest at latest-dev points at.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to build (defaults to the branch this workflow was launched from)"
        required: false
        default: ""

permissions:
  contents: write   # needed to recreate the latest-dev release and tag

jobs:
  dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Compute dev version stamp
        id: ver
        run: |
          SHORT=$(git rev-parse --short HEAD)
          STAMP="dev-$SHORT-$(date -u +%Y%m%d%H%M)"
          echo "stamp=$STAMP"  >> "$GITHUB_OUTPUT"
          echo "short=$SHORT"  >> "$GITHUB_OUTPUT"

      - name: Stamp version into sdkconfig.defaults
        run: |
          sed -i "s/^CONFIG_APP_PROJECT_VER=.*/CONFIG_APP_PROJECT_VER=\"${{ steps.ver.outputs.stamp }}\"/" \
              apps/wireless/sdkconfig.defaults

      - name: Build wireless app
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32s3
          path: apps/wireless

      - name: Build recovery app
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32s3
          path: apps/recovery

      - name: Stage assets and generate manifest
        run: |
          mkdir -p release
          cp apps/wireless/build/esp32_gopro_canbus_wireless.bin release/app.bin
          cp apps/wireless/build/storage.bin                          release/storage.bin
          cp apps/recovery/build/esp32_gopro_canbus_recovery.bin  release/recovery.bin
          python tools/release/make_manifest.py \
            --version "${{ steps.ver.outputs.stamp }}" \
            --channel dev \
            --app-bin     release/app.bin \
            --storage-bin release/storage.bin \
            --release-notes-url "https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}" \
            --output release/manifest.json

      - name: Move latest-dev floating release
        # Force-moved on every run; there is no immutable per-build tag for dev.
        # Source branch is recorded in the release notes for forensic purposes.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-dev --yes --cleanup-tag || true
          gh release create latest-dev \
            --title "Latest dev (${{ steps.ver.outputs.stamp }})" \
            --notes "Built from \`${GITHUB_SHA::7}\` on \`${{ github.event.inputs.ref || github.ref_name }}\`. Recovery-only channel; no promotion path." \
            --target "$GITHUB_SHA" \
            --prerelease \
            release/manifest.json release/app.bin release/storage.bin release/recovery.bin
