name: release-promote

# Promotes an existing release to stable. Pure pointer move - no rebuild,
# no version change. The bytes a user installs on stable are byte-identical
# to what beta testers already validated.
#
# Trigger from the Actions tab; supply an existing release tag, e.g. v0.2.1.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to promote (e.g. v0.2.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Verify source release and resolve its commit
        id: src
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::release $TAG not found"
            exit 1
          fi
          COMMIT=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${TAG}" --jq '.sha')
          if [ -z "$COMMIT" ]; then
            echo "::error::could not resolve $TAG to a commit"
            exit 1
          fi
          echo "Promoting $TAG (commit ${COMMIT:0:7}) to stable"
          echo "tag=$TAG"        >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT"  >> "$GITHUB_OUTPUT"

      - name: Download release assets from source tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release
          gh release download "${{ steps.src.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --dir release \
            --pattern 'manifest.json' \
            --pattern 'app.bin' \
            --pattern 'storage.bin' \
            --pattern 'recovery.bin'

      - name: Flip source release out of prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ steps.src.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease=false \
            --notes "Built from \`${{ steps.src.outputs.commit }}\`. Promoted to stable on $(date -u +%Y-%m-%d)."

      - name: Move latest-stable floating tag
        # Floating tag is what the Cloudflare Worker proxies to the device.
        # GitHub releases can't retarget a tag, so delete + recreate with the
        # exact same assets as the source release.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-stable --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          gh release create latest-stable \
            --repo "$GITHUB_REPOSITORY" \
            --title "Latest stable (${{ steps.src.outputs.tag }})" \
            --notes "Floating tag for \`${{ steps.src.outputs.tag }}\`." \
            --target "${{ steps.src.outputs.commit }}" \
            release/manifest.json release/app.bin release/storage.bin release/recovery.bin
