name: release-promote

# Promotes an existing release to stable. Pure pointer move — no rebuild,
# no version change. The bytes a user installs on stable are byte-identical
# to what beta testers already validated.
#
# Trigger from the Actions tab; supply an unsuffixed base version such as
# `v0.2.1`. Every variant in the matrix is promoted in lockstep (per
# `docs/multi-variant-restructure-plan.md` §6, Option A): the workflow looks
# up `<version>-<variant>` per matrix entry and moves
# `latest-stable-<variant>` to the same bytes.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Base release version to promote, e.g. v0.2.1 (workflow appends -<variant> per matrix entry)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [wireless]
    permissions:
      contents: write
    steps:
      # Checkout isn't strictly needed since we use --repo on every gh call,
      # but in practice gh release create has been observed to 403 here without
      # any local git context. Cheap to keep.
      - uses: actions/checkout@v5

      - name: Verify source release and resolve its commit
        id: src
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="${{ inputs.tag }}"
          TAG="${BASE}-${{ matrix.variant }}"
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::release $TAG not found"
            exit 1
          fi
          COMMIT=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${TAG}" --jq '.sha')
          if [ -z "$COMMIT" ]; then
            echo "::error::could not resolve $TAG to a commit"
            exit 1
          fi
          echo "Promoting $TAG (commit ${COMMIT:0:7}) to stable"
          echo "tag=$TAG"        >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT"  >> "$GITHUB_OUTPUT"
          echo "floating=latest-stable-${{ matrix.variant }}" >> "$GITHUB_OUTPUT"

      - name: Download release assets from source tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release
          gh release download "${{ steps.src.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --dir release \
            --pattern 'manifest.json' \
            --pattern 'app.bin' \
            --pattern 'storage.bin' \
            --pattern 'recovery.bin' \
            --pattern 'factory.bin'

      - name: Flip source release out of prerelease
        # Preserve the auto-generated changelog from the beta release and
        # append a promotion footer, rather than overwriting it.
        #
        # release-beta seeds the body with "...Not yet promoted to stable."
        # so the prerelease state is obvious to humans reading the release
        # page during the beta window. Strip that sentence on promotion —
        # otherwise the body ends up self-contradictory ("Not yet promoted
        # to stable" + "Promoted to stable on YYYY-MM-DD").
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh release view "${{ steps.src.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" --json body --jq '.body' \
            | sed 's/ Not yet promoted to stable\.//')
          {
            echo "$EXISTING"
            echo ""
            echo "---"
            echo "Promoted to stable on $(date -u +%Y-%m-%d)."
          } > "$RUNNER_TEMP/notes.md"
          gh release edit "${{ steps.src.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease=false \
            --notes-file "$RUNNER_TEMP/notes.md"

      - name: Move latest-stable-${{ matrix.variant }} floating tag
        # Floating tag is what the Cloudflare Worker proxies to the device.
        # GitHub releases can't retarget a tag, so delete + recreate with the
        # exact same assets as the source release.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.src.outputs.floating }}" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          # --prerelease on the floating pointer: the real stable release is
          # the immutable vX.Y.Z-<variant> tag (which release-promote flipped
          # out of prerelease above). The floating tag is plumbing for the
          # Cloudflare Worker, not a user-facing release. Marking it
          # prerelease also sidesteps a GitHub-side restriction that blocks
          # the bot token from creating new "Latest" releases (only
          # prereleases work).
          gh release create "${{ steps.src.outputs.floating }}" \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease \
            --title "Latest stable — ${{ matrix.variant }} (${{ steps.src.outputs.tag }})" \
            --notes "Floating tag for \`${{ steps.src.outputs.tag }}\`." \
            --target "${{ steps.src.outputs.commit }}" \
            release/manifest.json release/app.bin release/storage.bin release/recovery.bin release/factory.bin
