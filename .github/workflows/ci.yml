name: ci

# Build gate + host-side unit tests. Runs on every push and pull request so
# refactoring work is caught early. The two apps build under the same pinned
# ESP-IDF the release workflows use; the host tests compile the pure-logic
# sources against Unity and run on the native runner (no ESP-IDF needed).

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [main, recovery]
    steps:
      - uses: actions/checkout@v5

      - name: Build ${{ matrix.app }} app
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32s3
          path: apps/${{ matrix.app }}

  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake -S tests/host -B tests/host/build

      - name: Build
        run: cmake --build tests/host/build

      - name: Test
        run: ctest --test-dir tests/host/build --output-on-failure
